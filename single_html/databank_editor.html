    function kvRow(effectName, effectText, onSave, onDelete) {
      const row = document.createElement("div");
      row.className = "kv-row";
      const keyInput = document.createElement("input");
      keyInput.value = effectName;
      const valueInput = document.createElement("textarea");
      valueInput.value = typeof effectText === "string" ? effectText : JSON.stringify(effectText, null, 2);
      const save = () => onSave(keyInput.value.trim(), valueInput.value);
      keyInput.addEventListener("change", save);
      valueInput.addEventListener("change", save);
      const del = document.createElement("button");
      del.className = "small-btn danger";
      del.textContent = "删";
      del.addEventListener("click", onDelete);
      row.append(keyInput, valueInput, del);
      return row;
    }

    function fieldShell(parent, label, hint) {
      const field = document.createElement("div");
      field.className = "field";
      const labelNode = document.createElement("label");
      labelNode.innerHTML = "<span>" + escapeHtml(label) + "</span>" + (hint ? "<span class=\"hint\">" + escapeHtml(hint) + "</span>" : "");
      field.appendChild(labelNode);
      parent.appendChild(field);
      return field;
    }

    function updateSelected(label, mutator, options = {}) {
      const row = resolveRow(state.selected);
      if (!row) return;
      commit(label, () => {
        if (options.rebuildSpecial && state.currentFile === "baseInfo.json") {
          const target = getItem(row);
          mutator(target);
          applyBaseInfoRow(row, target);
        } else if (options.rebuildSpecial && state.currentFile === "coreClassification.json") {
          const target = getItem(row);
          mutator(target);
          applyCoreRow(row, target);
        } else {
          mutator(getItem(row));
        }
      });
      render();
    }

    function commit(label, fn) {
      state.undo.push(snapshot());
      if (state.undo.length > 80) state.undo.shift();
      state.redo.length = 0;
      fn();
      state.dirty.add(state.currentFile);
      state.changes.push(new Date().toLocaleTimeString() + " " + DATASETS[state.currentFile].label + ": " + label);
      setStatus(label);
    }

    function commitDirect(label, fn) {
      commit(label, fn);
      render();
    }

    function snapshot() {
      return {
        files: deepClone(state.files),
        currentFile: state.currentFile,
        currentCategory: state.currentCategory,
        selected: deepClone(state.selected),
        dirty: Array.from(state.dirty),
        changes: state.changes.slice(),
      };
    }

    function restore(snapshot) {
      state.files = snapshot.files;
      state.currentFile = snapshot.currentFile;
      state.currentCategory = snapshot.currentCategory;
      state.selected = snapshot.selected;
      state.dirty = new Set(snapshot.dirty);
      state.changes = snapshot.changes;
      state.selectedRows.clear();
    }

    function undo() {
      if (state.undo.length === 0) return;
      state.redo.push(snapshot());
      restore(state.undo.pop());
      setStatus("已撤销");
      render();
    }

    function redo() {
      if (state.redo.length === 0) return;
      state.undo.push(snapshot());
      restore(state.redo.pop());
      setStatus("已重做");
      render();
    }

    function addCategory() {
      const current = getCurrent();
      if (!current) return showToast("请先导入当前数据文件。");
      const name = prompt("新分类名称", "新分类");
      if (!name) return;
      if (getCategories().includes(name)) return showToast("分类已存在。");
      commit("新增分类 " + name, () => {
        if (current.kind === "baseInfo") {
          current.data[name] = [];
        } else {
          current.data[name] = current.kind === "coreClassification" ? {} : [];
        }
        state.currentCategory = name;
      });
      render();
    }

    function renameCategory() {
      const current = getCurrent();
      if (!current || state.currentCategory === "__all__") return showToast("请选择一个具体分类。");
      const oldName = state.currentCategory;
      const next = prompt("新的分类名称", oldName);
      if (!next || next === oldName) return;
      if (getCategories().includes(next)) return showToast("分类已存在。");
      commit("重命名分类 " + oldName + " -> " + next, () => {
        const entries = Object.entries(current.data);
        current.data = Object.fromEntries(entries.map(([key, value]) => (key === oldName ? [next, value] : [key, value])));
        state.files[state.currentFile].data = current.data;
        state.currentCategory = next;
      });
      render();
    }

    function deleteCategory() {
      const current = getCurrent();
      if (!current || state.currentCategory === "__all__") return showToast("请选择一个具体分类。");
      const count = countInCategory(state.currentCategory);
      if (!confirm("确认删除分类「" + state.currentCategory + "」？其中有 " + count + " 个条目。")) return;
      commit("删除分类 " + state.currentCategory, () => {
        delete current.data[state.currentCategory];
        state.currentCategory = "__all__";
        state.selected = null;
      });
      render();
    }

    async function mergeCategory() {
      const current = getCurrent();
      if (!current || state.currentCategory === "__all__") return showToast("请选择要合并的分类。");
      const source = state.currentCategory;
      const count = countInCategory(source);
      const target = await chooseCategory("把分类「" + source + "」合并到哪个分类？", "", { exclude: source, allowNew: false });
      if (!target || target === source) return;
      if (!canMergeCategoryData(current, source, target)) return showToast("这两个分类的数据形态不同，不能合并。");
      if (!confirm("确认把「" + source + "」中的 " + count + " 个条目合并到「" + target + "」？原分类会被删除。")) return;
      commit("合并分类 " + source + " -> " + target, () => {
        mergeCategoryData(current, source, target);
        state.currentCategory = target;
        state.selected = null;
        state.selectedRows.clear();
      });
      render();
    }

    function canMergeCategoryData(current, source, target) {
      const sourceValue = current.data[source];
      const targetValue = current.data[target];
      return Array.isArray(sourceValue) === Array.isArray(targetValue);
    }

    function mergeCategoryData(current, source, target) {
      current.data[target] ??= current.kind === "coreClassification" ? {} : [];
      const sourceValue = current.data[source];
      const targetValue = current.data[target];
      if (Array.isArray(sourceValue) && Array.isArray(targetValue)) {
        targetValue.push(...sourceValue);
        delete current.data[source];
        return;
      }
      if (sourceValue && targetValue && typeof sourceValue === "object" && typeof targetValue === "object" && !Array.isArray(sourceValue) && !Array.isArray(targetValue)) {
        Object.entries(sourceValue).forEach(([key, value]) => {
          const nextKey = targetValue[key] === undefined ? key : uniqueRecordKey(targetValue, key);
          targetValue[nextKey] = value;
        });
        delete current.data[source];
        return;
      }
      showToast("这两个分类的数据形态不同，不能合并。");
    }

    function uniqueRecordKey(record, baseKey) {
      let index = 2;
      let next = baseKey + " 合并";
      while (record[next] !== undefined) {
        next = baseKey + " 合并" + index;
        index += 1;
      }
      return next;
    }

    function addEntity() {
      const current = getCurrent();
      if (!current) return showToast("请先导入当前数据文件。");
      let category = state.currentCategory === "__all__" ? getCategories()[0] : state.currentCategory;
      if (!category) {
        category = prompt("先创建一个分类", "新分类");
        if (!category) return;
      }
      commit("新增条目", () => {
        if (current.kind === "baseInfo") {
          ensureBaseInfoCategory(current.data, category);
          if (Array.isArray(current.data[category])) {
            current.data[category].push("新选项");
            state.selected = { id: "base|" + category + "|" + (current.data[category].length - 1), category, mode: "array", index: current.data[category].length - 1 };
          } else {
            current.data[category]["新条目"] = 0;
            state.selected = { id: "base|" + category + "|新条目", category, mode: "record", key: "新条目" };
          }
        } else if (current.kind === "coreClassification") {
          current.data[category] ??= {};
          current.data[category]["新核心"] = { note: "" };
          state.selected = { id: "core|" + category + "|新核心", category, key: "新核心" };
        } else {
          current.data[category] ??= [];
          current.data[category].push(defaultEntity(state.currentFile, category));
          state.selected = { id: "row|" + category + "|" + (current.data[category].length - 1), category, index: current.data[category].length - 1 };
        }
        state.currentCategory = category;
      });
      render();
    }

    function duplicateSelected() {
      const row = resolveRow(state.selected);
      if (!row) return;
      commit("复制 " + getName(row), () => {
        const current = getCurrent();
        if (current.kind === "collection") {
          const copy = deepClone(getItem(row));
          if (copy.name) copy.name += " 副本";
          current.data[row.category].splice(row.index + 1, 0, copy);
          state.selected = { id: "row|" + row.category + "|" + (row.index + 1), category: row.category, index: row.index + 1 };
        } else if (current.kind === "baseInfo") {
          duplicateBaseRow(row);
        } else {
          const copy = deepClone(getItem(row));
          const nextName = (copy.name || row.key) + " 副本";
          current.data[row.category][nextName] = { note: copy.note || "" };
          state.selected = { id: "core|" + row.category + "|" + nextName, category: row.category, key: nextName };
        }
      });
      render();
    }

    async function moveSelected() {
      const row = resolveRow(state.selected);
      if (!row) return;
      const target = await chooseCategory("移动「" + getName(row) + "」到哪个分类？", row.category);
      if (!target || target === row.category) return;
      commit("移动 " + getName(row) + " 到 " + target, () => moveRow(row, target));
      state.currentCategory = target;
      render();
    }

    function deleteSelectedEntity() {
      const row = resolveRow(state.selected);
      if (!row) return;
      if (!confirm("确认删除「" + getName(row) + "」？")) return;
      commit("删除 " + getName(row), () => removeRow(row));
      state.selected = null;
      render();
    }

    function toggleAllVisibleRows() {
      const rows = getVisibleRows();
      if (el.selectAllRows.checked) rows.forEach(row => state.selectedRows.add(row.id));
      else rows.forEach(row => state.selectedRows.delete(row.id));
      renderTable();
      updateButtons();
    }

    async function applyBatch() {
      const ids = Array.from(state.selectedRows);
      if (ids.length === 0) return showToast("请先勾选条目。");
      let targetCategory = el.batchCategory.value;
      if (targetCategory === "__new__") {
        targetCategory = await chooseCategory("批量移动到哪个分类？", "");
        if (!targetCategory) return;
      }
      const rarity = el.batchRarity.value;
      const tag = el.batchTag.value.trim();
      const costDelta = el.batchCost.value === "" ? null : Number(el.batchCost.value);
      if (!targetCategory && !rarity && !tag && costDelta === null) return showToast("没有填写批量操作。");
      commit("批量修改 " + ids.length + " 项", () => {
        const rows = ids.map(id => resolveRowById(id)).filter(Boolean).sort((a, b) => {
          if (a.category === b.category) return (b.index ?? 0) - (a.index ?? 0);
          return a.category.localeCompare(b.category, "zh-Hans");
        });
        rows.forEach(row => {
          if (targetCategory) {
            row = moveRow(row, targetCategory);
          }
          const item = getItem(row);
          if (rarity && "rarity" in item) item.rarity = rarity;
          if (tag && Array.isArray(item.tag) && !item.tag.includes(tag)) item.tag.push(tag);
          if (costDelta !== null && typeof item.cost === "number") item.cost += costDelta;
        });
      });
      state.selectedRows.clear();
      el.batchTag.value = "";
      el.batchCost.value = "";
      el.batchRarity.value = "";
      render();
    }

    function deleteSelected() {
      const ids = Array.from(state.selectedRows);
      if (ids.length === 0) return showToast("请先勾选条目。");
      if (!confirm("确认删除选中的 " + ids.length + " 项？")) return;
      commit("批量删除 " + ids.length + " 项", () => {
        ids.map(id => resolveRowById(id)).filter(Boolean).sort((a, b) => b.index - a.index).forEach(removeRow);
      });
      state.selectedRows.clear();
      state.selected = null;
      render();
    }

    function showExportChoices() {
      const current = getCurrent();
      const fileCount = Object.keys(state.files).length;
      openChoiceModal("导出数据", [
        {
          title: "导出当前文件",
          desc: current ? "下载当前正在编辑的 " + current.filename : "当前数据文件还没有导入",
          disabled: !current,
          action: exportCurrent,
        },
        {
          title: "导出全部文件",
          desc: fileCount ? "逐个下载已导入的 " + fileCount + " 个文件" : "还没有导入任何文件",
          disabled: fileCount === 0,
          action: exportAll,
        },
      ]);
    }

    function showHistoryChoices() {
      openChoiceModal("历史操作", [
        {
          title: "撤销",
          desc: state.undo.length ? "回到上一步修改前" : "暂无可撤销操作",
          disabled: state.undo.length === 0,
          action: undo,
        },
        {
          title: "重做",
          desc: state.redo.length ? "恢复刚才撤销的修改" : "暂无可重做操作",
          disabled: state.redo.length === 0,
          action: redo,
        },
      ]);
    }

    function exportCurrent() {
      const current = getCurrent();
      if (!current) return showToast("当前文件还没有导入。");
      downloadJson(current.filename, current.data);
      state.dirty.delete(current.filename);
      state.changes.push(new Date().toLocaleTimeString() + " 导出 " + current.filename);
      setStatus("已导出 " + current.filename);
      renderTable();
    }

    function exportAll() {
      const files = Object.values(state.files);
      if (files.length === 0) return showToast("还没有导入任何文件。");
      files.forEach((file, index) => {
        setTimeout(() => downloadJson(file.filename, file.data), index * 180);
        state.dirty.delete(file.filename);
      });
      state.changes.push(new Date().toLocaleTimeString() + " 导出全部文件");
      setStatus("已开始导出 " + files.length + " 个文件");
      renderTable();
    }

    function downloadJson(filename, data) {
      const text = JSON.stringify(data, null, 2) + "\n";
      const blob = new Blob([text], { type: "application/json;charset=utf-8" });
      const url = URL.createObjectURL(blob);
      const a = document.createElement("a");
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      a.remove();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }

    function showChangeSummary() {
      const rows = getRows();
      const duplicateMap = getDuplicateNameMap();
      const warnings = rows.flatMap(row => validateRow(row, duplicateMap).map(text => DATASETS[state.currentFile].label + " / " + row.category + " / " + getName(row) + ": " + text));
      const content = [
        "已导入文件: " + Object.keys(state.files).join(", "),
        "未导出修改: " + (state.dirty.size ? Array.from(state.dirty).join(", ") : "无"),
        "",
        "最近改动:",
        state.changes.length ? state.changes.slice(-80).join("\n") : "暂无",
        "",
        "当前文件提示:",
        warnings.length ? warnings.slice(0, 120).join("\n") : "未发现明显问题",
      ].join("\n");
      openModal("改动摘要", content);
    }

    function getCurrent() {
      return state.files[state.currentFile] || null;
    }

    function getCategories() {
      const current = getCurrent();
      if (!current) return [];
      return Object.keys(current.data || {});
    }

    function getRows() {
      const current = getCurrent();
      if (!current) return [];
      if (current.kind === "baseInfo") return getBaseRows(current.data);
      if (current.kind === "coreClassification") return getCoreRows(current.data);
      const rows = [];
      for (const [category, items] of Object.entries(current.data || {})) {
        if (!Array.isArray(items)) continue;
        items.forEach((item, index) => {
          rows.push({ id: "row|" + category + "|" + index, category, index, item });
        });
      }
      return rows;
    }

    function getBaseRows(data) {
      const rows = [];
      for (const [category, value] of Object.entries(data || {})) {
        if (Array.isArray(value)) {
          value.forEach((entry, index) => rows.push({
            id: "base|" + category + "|" + index,
            category,
            mode: "array",
            index,
            item: { value: entry },
          }));
        } else if (value && typeof value === "object") {
          Object.entries(value).forEach(([key, cost]) => rows.push({
            id: "base|" + category + "|" + key,
            category,
            mode: "record",
            key,
            item: { name: key, cost },
          }));
        }
      }
      return rows;
    }

    function getCoreRows(data) {
      const rows = [];
      for (const [category, cores] of Object.entries(data || {})) {
        if (!cores || typeof cores !== "object") continue;
        Object.entries(cores).forEach(([key, value]) => rows.push({
          id: "core|" + category + "|" + key,
          category,
          key,
          item: { name: key, note: value?.note || "" },
        }));
      }
      return rows;
    }

    function getVisibleRows() {
      const rows = getRows().filter(row => {
        if (state.currentCategory !== "__all__" && row.category !== state.currentCategory) return false;
        const item = getItem(row);
        if (state.rarity && item.rarity !== state.rarity) return false;
        if (state.type && item.type !== state.type) return false;
        if (state.search) {
          const text = (getName(row) + " " + JSON.stringify(item)).toLowerCase();
          if (!text.includes(state.search)) return false;
        }
        return true;
      });
      return sortRows(rows);
    }

    function sortRows(rows) {
      const result = rows.slice();
      result.sort((a, b) => {
        const ai = getItem(a);
        const bi = getItem(b);
        if (state.sort === "name-asc") return getName(a).localeCompare(getName(b), "zh-Hans");
        if (state.sort === "name-desc") return getName(b).localeCompare(getName(a), "zh-Hans");
        if (state.sort === "cost-asc") return numberOrMax(ai.cost) - numberOrMax(bi.cost);
        if (state.sort === "cost-desc") return numberOrMax(bi.cost) - numberOrMax(ai.cost);
        if (state.sort === "rarity") return (RARITY_ORDER.get(ai.rarity) ?? 99) - (RARITY_ORDER.get(bi.rarity) ?? 99);
        return getCategories().indexOf(a.category) - getCategories().indexOf(b.category) || (a.index ?? 0) - (b.index ?? 0);
      });
      return result;
    }

    function resolveRow(row) {
      if (!row) return null;
      return resolveRowById(row.id);
    }

    function resolveRowById(id) {
      return getRows().find(row => row.id === id) || null;
    }

    function getItem(row) {
      return row?.item || {};
    }

    function getName(row) {
      const item = getItem(row);
      if (state.currentFile === "baseInfo.json" && row.mode === "array") return String(item.value ?? "");
      return String(item.name ?? row.key ?? "");
    }

    function applyBaseInfoRow(row, item) {
      const current = getCurrent();
      if (row.mode === "array") {
        current.data[row.category][row.index] = item.value || "";
        state.selected = { ...row, item: { value: item.value || "" }, id: "base|" + row.category + "|" + row.index };
      } else {
        const record = current.data[row.category];
        const oldKey = row.key;
        const newKey = item.name || oldKey;
        if (newKey !== oldKey) {
          delete record[oldKey];
          record[newKey] = Number(item.cost || 0);
          state.selected = { id: "base|" + row.category + "|" + newKey, category: row.category, mode: "record", key: newKey };
        } else {
          record[oldKey] = Number(item.cost || 0);
        }
      }
    }

    function applyCoreRow(row, item) {
      const current = getCurrent();
      const oldKey = row.key;
      const newKey = item.name || oldKey;
      const record = current.data[row.category];
      if (newKey !== oldKey) {
        delete record[oldKey];
        record[newKey] = { note: item.note || "" };
        state.selected = { id: "core|" + row.category + "|" + newKey, category: row.category, key: newKey };
      } else {
        record[oldKey] = { note: item.note || "" };
      }
    }

    function duplicateBaseRow(row) {
      const current = getCurrent();
      if (row.mode === "array") {
        current.data[row.category].splice(row.index + 1, 0, String(getItem(row).value || "") + " 副本");
        state.selected = { id: "base|" + row.category + "|" + (row.index + 1), category: row.category, mode: "array", index: row.index + 1 };
      } else {
        const next = String(row.key) + " 副本";
        current.data[row.category][next] = getItem(row).cost || 0;
        state.selected = { id: "base|" + row.category + "|" + next, category: row.category, mode: "record", key: next };
      }
    }

    function moveRow(row, targetCategory) {
      const current = getCurrent();
      if (current.kind === "collection") {
        current.data[targetCategory] ??= [];
        const [item] = current.data[row.category].splice(row.index, 1);
        current.data[targetCategory].push(item);
        return { id: "row|" + targetCategory + "|" + (current.data[targetCategory].length - 1), category: targetCategory, index: current.data[targetCategory].length - 1 };
      }
      if (current.kind === "coreClassification") {
        current.data[targetCategory] ??= {};
        current.data[targetCategory][row.key] = current.data[row.category][row.key];
        delete current.data[row.category][row.key];
        return { id: "core|" + targetCategory + "|" + row.key, category: targetCategory, key: row.key };
      }
      ensureBaseInfoCategory(current.data, targetCategory);
      if (row.mode === "array" && Array.isArray(current.data[targetCategory])) {
        current.data[targetCategory].push(getItem(row).value || "");
        current.data[row.category].splice(row.index, 1);
        return { id: "base|" + targetCategory + "|" + (current.data[targetCategory].length - 1), category: targetCategory, mode: "array", index: current.data[targetCategory].length - 1 };
      }
      if (row.mode === "record" && !Array.isArray(current.data[targetCategory])) {
        current.data[targetCategory][row.key] = getItem(row).cost || 0;
        delete current.data[row.category][row.key];
        return { id: "base|" + targetCategory + "|" + row.key, category: targetCategory, mode: "record", key: row.key };
      }
      showToast("基础信息的数组分类和点数分类不能互相移动。");
      return row;
    }

    function removeRow(row) {
      const current = getCurrent();
      if (current.kind === "collection") {
        current.data[row.category].splice(row.index, 1);
      } else if (current.kind === "coreClassification") {
        delete current.data[row.category][row.key];
      } else if (row.mode === "array") {
        current.data[row.category].splice(row.index, 1);
      } else {
        delete current.data[row.category][row.key];
      }
    }

    function countInCategory(category) {
      const current = getCurrent();
      if (!current) return 0;
      if (current.kind === "collection") return Array.isArray(current.data[category]) ? current.data[category].length : 0;
      if (current.kind === "coreClassification") return current.data[category] ? Object.keys(current.data[category]).length : 0;
      const value = current.data[category];
      return Array.isArray(value) ? value.length : value && typeof value === "object" ? Object.keys(value).length : 0;
    }

    function getFileCount(filename) {
      const file = state.files[filename];
      if (!file) return "未导入";
      if (file.kind === "collection") return getRowsForFile(filename).length + " 项";
      if (file.kind === "coreClassification") return getRowsForFile(filename).length + " 核心";
      return getRowsForFile(filename).length + " 项";
    }

    function getRowsForFile(filename) {
      const old = state.currentFile;
      state.currentFile = filename;
      const rows = getRows();
      state.currentFile = old;
      return rows;
    }

    function validateRow(row, duplicateMap) {
      const item = getItem(row);
      const warnings = [];
      const name = getName(row);
      if (!name.trim()) warnings.push("名称为空");
      if (duplicateMap.get(name)?.length > 1) warnings.push("名称重复");
      const config = DATASETS[state.currentFile];
      for (const key of config.required || []) {
        if (item[key] === undefined || item[key] === "" || item[key] === null) warnings.push("缺少" + fieldLabel(key));
      }
      if ("cost" in item && typeof item.cost !== "number") warnings.push("消耗不是数字");
      if ("level" in item && typeof item.level !== "number") warnings.push("等级不是数字");
      if ("rarity" in item && item.rarity && !RARITIES.includes(item.rarity)) warnings.push("未知品质");
      if ("tag" in item && !Array.isArray(item.tag)) warnings.push("标签格式错误");
      if ("effect" in item && (!item.effect || typeof item.effect !== "object" || Array.isArray(item.effect))) warnings.push("效果格式错误");
      if (state.currentFile === "skills.json" && !item.consume) warnings.push("技能缺少消耗说明");
      if (state.currentFile === "partners.json") {
        const attr = item.attributes || {};
        ["strength", "dexterity", "constitution", "intelligence", "mind"].forEach(key => {
          if (typeof attr[key] !== "number") warnings.push("缺少" + fieldLabel(key));
        });
      }
      return warnings;
    }

    function getDuplicateNameMap() {
      const map = new Map();
      for (const row of getRows()) {
        const name = getName(row);
        if (!name) continue;
        if (!map.has(name)) map.set(name, []);
        map.get(name).push(row.id);
      }
      return map;
    }

    function collectFieldValues(key) {
      return unique(getRows().map(row => getItem(row)[key]).filter(Boolean));
    }

    function defaultEntity(filename, category) {
      if (filename === "equipments.json") {
        return { name: "新装备", cost: 0, type: inferTypeFromCategory(category, "装备"), rarity: "common", tag: [], effect: {}, description: "" };
      }
      if (filename === "items.json") {
        return { name: "新道具", cost: 0, type: category || "其它", rarity: "common", quantity: 1, tag: [], effect: {}, description: "" };
      }
      if (filename === "skills.json") {
        return { name: "新技能", cost: 0, consume: "", type: "主动", rarity: "common", tag: [], effect: {}, description: "" };
      }
      if (filename === "backgrounds.json") {
        return { name: "新开局", description: "" };
      }
      if (filename === "partners.json") {
        return {
          name: "新伙伴",
          cost: 0,
          lifeLevel: "",
          level: 1,
          race: "",
          identity: [],
          career: [],
          personality: "",
          like: "",
          app: "",
          cloth: "",
          equip: [],
          attributes: { strength: 0, dexterity: 0, constitution: 0, intelligence: 0, mind: 0 },
          stairway: { isOpen: false },
          isContract: false,
          affinity: 0,
          comment: "",
          backgroundInfo: "",
          skills: [],
        };
      }
      return { name: "新条目" };
    }

    function defaultNested(mode) {
      return mode === "skill"
        ? { name: "新技能", type: "主动", rarity: "common", consume: "", tag: [], effect: {}, description: "" }
        : { name: "新装备", type: "装备", rarity: "common", tag: [], effect: {}, description: "" };
    }

    function inferTypeFromCategory(category, fallback) {
      if (!category) return fallback;
      if (category.includes("武器")) return "武器";
      if (category.includes("防具") || category.includes("盾")) return "防具";
      if (category.includes("饰") || category.includes("戒") || category.includes("项链") || category.includes("护符")) return "饰品";
      return fallback;
    }

    function ensureBaseInfoCategory(data, category) {
      if (data[category] !== undefined) return;
      if (category.includes("Costs")) data[category] = {};
      else data[category] = [];
    }

    function updateButtons() {
      const hasCurrent = Boolean(getCurrent());
      const hasSelected = Boolean(resolveRow(state.selected));
      el.exportBtn.disabled = !hasCurrent && Object.keys(state.files).length === 0;
      el.historyBtn.disabled = state.undo.length === 0 && state.redo.length === 0;
      el.addCategoryBtn.disabled = !hasCurrent;
      el.mergeCategoryBtn.disabled = !hasCurrent || state.currentCategory === "__all__" || getCategories().length < 2;
      el.renameCategoryBtn.disabled = !hasCurrent || state.currentCategory === "__all__";
      el.deleteCategoryBtn.disabled = !hasCurrent || state.currentCategory === "__all__";
      el.addEntityBtn.disabled = !hasCurrent;
      el.duplicateEntityBtn.disabled = !hasSelected;
      el.moveEntityBtn.disabled = !hasSelected;
      el.deleteEntityBtn.disabled = !hasSelected;
      el.applyBatchBtn.disabled = state.selectedRows.size === 0;
      el.deleteSelectedBtn.disabled = state.selectedRows.size === 0;
    }

    function setSelect(select, options, value) {
      const current = value ?? select.value;
      select.innerHTML = "";
      options.forEach(([optionValue, label]) => {
        const option = document.createElement("option");
        option.value = optionValue;
        option.textContent = label;
        select.appendChild(option);
      });
      select.value = options.some(([optionValue]) => optionValue === current) ? current : "";
    }

    function sortRarities(values) {
      return values.slice().sort((a, b) => (RARITY_ORDER.get(a) ?? 99) - (RARITY_ORDER.get(b) ?? 99));
    }

    function rarityOptions() {
      return [["", "未设置"]].concat(RARITIES.map(value => [value, rarityLabel(value)]));
    }

    function rarityLabel(value) {
      return RARITY_LABELS[value] || value || "";
    }

    function fieldLabel(key) {
      return FIELD_LABELS[key] || ATTRIBUTE_LABELS[key] || key;
    }

    function setCleanValue(target, key, value) {
      if (value === "" || value === undefined || value === null) delete target[key];
      else target[key] = value;
    }

    function cell(html) {
      const td = document.createElement("td");
      td.innerHTML = html;
      return td;
    }

    function renderNameCell(row, item) {
      const rarity = item.rarity
        ? "<span class=\"pill rarity-" + escapeAttr(item.rarity) + "\">" + escapeHtml(rarityLabel(item.rarity)) + "</span>"
        : "";
      return [
        "<div class=\"cell-name\"><span class=\"pill-line\">" + rarity + "<strong>" + escapeHtml(getName(row)) + "</strong></span></div>",
        "<div class=\"cell-muted\">" + escapeHtml(getDescriptionPreview(item)) + "</div>",
      ].join("");
    }

    function renderTypeOnly(item) {
      if (item.type) return "<span class=\"pill\">" + escapeHtml(item.type) + "</span>";
      return "<span class=\"cell-muted\">无</span>";
    }

    function renderTags(item) {
      const tags = Array.isArray(item.tag) ? item.tag : Array.isArray(item.identity) ? item.identity : [];
      if (!tags.length) return "<span class=\"cell-muted\">无</span>";
      return "<div class=\"pill-line\">" + tags.slice(0, 5).map(tag => "<span class=\"pill\">" + escapeHtml(tag) + "</span>").join("") + (tags.length > 5 ? "<span class=\"pill\">+" + (tags.length - 5) + "</span>" : "") + "</div>";
    }

    function renderWarnings(warnings) {
      if (!warnings.length) return "<span class=\"cell-muted\">通过</span>";
      return "<div class=\"warning-list\">" + warnings.slice(0, 3).map(escapeHtml).join("<br>") + (warnings.length > 3 ? "<br>+" + (warnings.length - 3) : "") + "</div>";
    }

    function formatCost(item) {
      if (item.cost === undefined) return "<span class=\"cell-muted\">无</span>";
      return escapeHtml(String(item.cost));
    }

    function getDescriptionPreview(item) {
      return String(item.description || item.backgroundInfo || item.note || item.value || "").slice(0, 80);
    }

    function buildTableSummary(rows) {
      const total = getRows().length;
      const visible = rows.length;
      const currentLabel = DATASETS[state.currentFile]?.label || "数据";
      const dragHint = canDragRows() ? "。按住“拖”移动条目，会直接改变 JSON 里的物品位置" : "";
      return currentLabel + ": 显示 " + visible + " / 总计 " + total + "，分类 " + getCategories().length + " 个" + dragHint;
    }

    function numberOrMax(value) {
      return typeof value === "number" ? value : Number.MAX_SAFE_INTEGER;
    }

    function unique(values) {
      return Array.from(new Set(values.map(value => String(value)))).sort((a, b) => a.localeCompare(b, "zh-Hans"));
    }

    function deepClone(value) {
      return JSON.parse(JSON.stringify(value));
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function escapeAttr(value) {
      return String(value ?? "").replace(/[^a-z0-9_-]/gi, "");
    }

    function setStatus(text) {
      el.statusText.textContent = text;
    }

    function showToast(text) {
      el.toast.textContent = text;
      el.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => el.toast.classList.remove("show"), 3200);
    }

    function setupSplitters() {
      const root = document.querySelector(".app");
      const startDrag = (splitter, side, event) => {
        event.preventDefault();
        splitter.classList.add("dragging");
        const onMove = moveEvent => {
          const rect = root.getBoundingClientRect();
          if (side === "left") {
            const width = Math.min(Math.max(moveEvent.clientX - rect.left, 160), 380);
            root.style.setProperty("--sidebar-w", width + "px");
          } else {
            const width = Math.min(Math.max(rect.right - moveEvent.clientX, 420), Math.max(520, rect.width - 560));
            root.style.setProperty("--editor-w", width + "px");
          }
        };
        const onUp = () => {
          splitter.classList.remove("dragging");
          window.removeEventListener("mousemove", onMove);
          window.removeEventListener("mouseup", onUp);
        };
        window.addEventListener("mousemove", onMove);
        window.addEventListener("mouseup", onUp);
      };
      el.leftSplitter.addEventListener("mousedown", event => startDrag(el.leftSplitter, "left", event));
      el.rightSplitter.addEventListener("mousedown", event => startDrag(el.rightSplitter, "right", event));
    }

    function openChoiceModal(title, choices) {
      el.modalTitle.textContent = title;
      el.modalContent.innerHTML = "";
      const list = document.createElement("div");
      list.className = "choice-list";
      choices.forEach(choice => {
        const button = document.createElement("button");
        button.className = "choice-card";
        button.disabled = Boolean(choice.disabled);
        button.innerHTML = "<strong>" + escapeHtml(choice.title) + "</strong><span>" + escapeHtml(choice.desc || "") + "</span>";
        button.addEventListener("click", () => {
          closeModal({ silent: true });
          choice.action();
        });
        list.appendChild(button);
      });
      el.modalContent.appendChild(list);
      el.modalActions.innerHTML = "";
      const close = document.createElement("button");
      close.textContent = "关闭";
      close.addEventListener("click", closeModal);
      el.modalActions.appendChild(close);
      el.modalBackdrop.classList.add("show");
    }

    function openModal(title, content) {
      el.modalTitle.textContent = title;
      el.modalContent.textContent = content;
      el.modalActions.innerHTML = "";
      const close = document.createElement("button");
      close.textContent = "关闭";
      close.addEventListener("click", closeModal);
      el.modalActions.appendChild(close);
      el.modalBackdrop.classList.add("show");
    }

    function closeModal(options = {}) {
      el.modalBackdrop.classList.remove("show");
      if (!options.silent && state.modalResolver) {
        state.modalResolver(null);
        state.modalResolver = null;
      }
    }

    function chooseCategory(title, currentCategory, options = {}) {
      const allowNew = options.allowNew !== false;
      const categories = getCategories().filter(category => category !== options.exclude);
      return new Promise(resolve => {
        state.modalResolver = resolve;
        el.modalTitle.textContent = title;
        el.modalContent.innerHTML = "";
        const form = document.createElement("div");
        form.className = "category-picker";
        form.innerHTML = allowNew
          ? [
              "<label><span>选择现有分类</span><select id=\"categoryPickSelect\"></select></label>",
              "<label><span>或新建分类</span><input id=\"categoryPickNew\" placeholder=\"只在需要新分类时填写\" /></label>",
              "<div class=\"hint\">优先使用新建分类；如果留空，就使用上面的现有分类。</div>",
            ].join("")
          : [
              "<label><span>选择目标分类</span><select id=\"categoryPickSelect\"></select></label>",
              "<div class=\"hint\">会把当前分类的条目追加到目标分类末尾，并删除当前分类。</div>",
            ].join("");
        el.modalContent.appendChild(form);

        const select = form.querySelector("#categoryPickSelect");
        setSelect(select, categories.map(category => [category, category]), currentCategory || categories[0] || "");
        const input = form.querySelector("#categoryPickNew");

        el.modalActions.innerHTML = "";
        const confirm = document.createElement("button");
        confirm.className = "primary";
        confirm.textContent = "确定";
        confirm.addEventListener("click", () => {
          const value = (allowNew && input ? input.value.trim() : "") || select.value;
          el.modalBackdrop.classList.remove("show");
          state.modalResolver = null;
          resolve(value || null);
        });
        const cancel = document.createElement("button");
        cancel.textContent = "取消";
        cancel.addEventListener("click", () => {
          el.modalBackdrop.classList.remove("show");
          state.modalResolver = null;
          resolve(null);
        });
        el.modalActions.append(confirm, cancel);
        el.modalBackdrop.classList.add("show");
        if (input) input.focus();
        else select.focus();
      });
    }
  </script>
</body>
</html>
