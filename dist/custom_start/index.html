出现在你的口袋里，上面是\\"暗影之手\\"的印记。他们邀请你去城中最混乱的街区进行一场交易。"\n    },\n    {\n      "name": "阴霾中的抉择",\n      "description": "在靠近兽族联盟的帝国边境城镇，你看到一张通缉令，悬赏一名\\"叛逃的帝国士兵\\"。然而，酒馆里的佣兵却说，那名士兵是因为发现了某个贵族的秘密才被灭口的。"\n    },\n    {\n      "name": "暗影刺客",\n      "description": "你是暗影之手从小培养的暗影刺客，今天是暗影刺客的第一课[杀人]，现在你来到城市的地下酒馆挑选刺杀任务。"\n    },\n    {\n      "name": "异乡，异端！",\n      "description": "你是遥远东方大陆的吟游诗人，手持一本《格林童话》在旅馆中与冒险者或者孩童们或是讲述故事又或是吟唱诗歌。"\n    },\n    {\n      "name": "勇者召唤",\n      "description": "随着异神的封印愈加松动，帝国女皇命令圣女施展古魔法阵召唤异世勇者消灭异神，法阵召唤出四位勇者，“理之魔女”、“剑之勇者”、“盾之壁垒”与<user>，三人召唤后都伴随异象与强大的气势，但<user>什么也没有发生，让众人感到困惑和质疑。"\n    },\n    {\n      "name": "迟到的人",\n      "description": "一处废弃古堡内本应在五百年前启动的魔法阵突然激活。六具人体被召唤至法阵的六角上，其中三人当场死亡。次日清晨，<user>在废墟中转醒，发现自己记忆全失且赤身裸体，在迷茫中穿上身旁叠好的华丽旧衣。"\n    },\n    {\n      "name": "勇敢的人",\n      "description": "异神封印日渐松动，帝国四处征兵。为凑热闹，村里的铁匠将一把钢剑插进石头，还附魔重力符文，笑称是“勇者之剑”。三年来，村里大人常逗孩子去拔剑，却无人能拔出。直到今天，<user>伸手拔剑，剑生锈断了，铁匠尴尬之下，干脆声称你就是勇者，并将一把优良品质的剑赠予你。手握利剑，你确信自己正是命中注定要讨伐异神之人。"\n    },\n    {\n      "name": "暗黑地牢",\n      "description": "<user>收到一份遗书，你被家族的先祖选做庄园的继承人，你的祖先在信中透露，他在庄园地下发现并释放了不可名状的邪恶力量，进行了一系列疯狂堕落的实验，最终酿成大祸。现在，这股腐化正在蔓延，侵蚀着土地和人心，你的任务就是前往庄园，深入庄园地下的巢穴、森林、海湾等被诅咒之地，清理祖先留下的烂摊子，逐步直面地底深处的终极恐怖。"\n    },\n    {\n      "name": "人偶姐姐",\n      "description": "<user>有一个姐姐从小处于无意识状态，家中还算富裕，使用炼金器官维持姐姐的生命，但父母在一次兽族斥候的袭击中去世，你肩负家庭以及守护姐姐的责任，你应该去寻找维护和更换炼金器官和人体改造的能力。"\n    },\n    {\n      "name": "小兵之路",\n      "description": "<user>在军团的征兵点报名参军，跟着队列进了新兵营地。军需官给<user>发了制式短剑、旧甲、行军毯和木水壶，<user>抱着基础物资回到分配的住处，准备换上军装去校场报道。"\n    },\n    {\n      "name": "猎人/猎物",\n      "description": "<user>在林边醒来，记忆一片空白，绞尽脑汁回想冒出来的却只是关于追踪和隐藏的知识。低头时<user>发现右手手背纹着一枚狼首纹身：外圈是断裂的圆环，狼瞳处有一点暗红。<user>进城想打听身份，却在悬赏公告板上看见了自己的肖像。"\n    },\n    {\n      "name": "迷因救赎",\n      "description": "<user>被人栽赃，背上莫须有的罪名入狱。铁门每天按时开合，<user>在牢里做工、吃饭、点名，等待着机会"\n    }\n  ],\n  // 身份限定开局\n  "身份限定": [\n    {\n      "name": "庄园领主",\n      "description": "<user>是本地世袭骑士，父亲的膝盖曾为伯爵大人挡过一箭，伯爵大人授予父亲世袭骑士爵位，并授予一处不大的庄园，但好景不长，数年前敌对领主袭击本地，父母战死，领地被毁，而你被伯爵大人带着逃跑，免于一难，现在你回到这片曾经被授予的庄园废墟，你挖出庄园地下室的宝藏，准备重建庄园",\n      "requiredIdentity": "低级世袭贵族"\n    },\n    {\n      "name": "订婚典礼",\n      "description": "明天就是和自己两情相悦的青梅竹马的订婚典礼了，你有些焦虑，而对方做好了和你一起面对任何未来的准备并一直在安慰你",\n      "requiredIdentity": "低级世袭贵族"\n    },\n    {\n      "name": "小奴隶主",\n      "description": "<user>收到一份遗产证明，远房表亲突然暴毙且缺少合法继承人，但最终按照血脉关系，这份遗产落到你头上，当你来到远房表亲的宅邸后，发现他生前是奴隶主，你继承了家产，同时也继承了他的奴隶们，现在你该怎么办呢？",\n      "requiredIdentity": "奴隶主"\n    },\n    {\n      "name": "佣兵生涯",\n      "description": " <user>是一位刚加入佣兵团的新人，需要证明自己的价值。第一个任务是护送商队前往目标地点，据说路途中有强盗与魔物出没。在佣兵团的营地里，团长正在向你介绍队伍的成员和任务详情。",\n      "requiredIdentity": "自由佣兵"\n    },\n    {\n      "name": "捕奴队猎手",\n      "description": " <user>是捕奴队里刚入行的新人，在营地里队长正在训话以及决定目标，而你正摩拳擦掌准备抓捕那些珍奇种族，队长保证任务完成后给大伙发性奴。",\n      "requiredIdentity": "捕奴队猎手"\n    },\n    {\n      "name": "商会继承",\n      "description": "<user>的父亲是金狮商会的重要成员，但在一次意外中不幸去世。按照商会传统，你必须接管父亲的生意和责任。然而商会的内部竞争异常激烈，有人觊觎你的职位，你必须尽快证明自己的商业才能，巩固自己的地位。",\n      "requiredIdentity": "商会商人"\n    },\n    {\n      "name": "小店主",\n      "description": "一位富商被匪徒袭击身受重伤，而<user>用自己的药水救了他，他决定转让一间自己的店铺给<user>，他名下有各式各样的店铺等你挑选，面包店、旅馆、铁匠铺、炼金商店甚至妓院都有，你的选择是？",\n      "requiredIdentity": "店主"\n    }\n  ],\n  // 种族限定开局\n  "种族限定": [\n    {\n      "name": "圣金之翼的试炼",\n      "description": "（仅限翼民）作为一名年轻的翼民，你即将接受攀登圣山、面见教皇的“圣金之翼”试炼。这不仅是对你飞行技巧和信仰的考验，也是决定你未来在圣都梵尼亚地位的关键仪式。",\n      "requiredRace": "翼民"\n    },\n    {\n      "name": "生命庆典的骚动",\n      "description": "（仅限精灵）作为一名精灵，你被长者派去调查“新芽之月”生命庆典上出现的魔力紊乱现象。这股力量似乎源自森林深处，它既可能带来新生，也可能引向腐化。",\n      "requiredRace": "精灵"\n    },\n    {\n      "name": "沉眠造物", // by Ayrault\n      "description": "你的魔力核心在沉寂不知多少个千年之后重新开始了运转。周围的景物映入你的感知，却与你沉眠前大不相同。曾经辉煌的城市化作了遗迹，曾经的同僚也已破损不堪。你低下头，注意到有陌生的构装体们在为你充能并修复伤势。",\n      "requiredRace": "构装体"\n    },\n    {\n      "name": "失落的氏族图腾",\n      "description": "（仅限兽族）你的氏族图腾被敌对部落偷走了，这是奇耻大辱。你必须独自潜入对方的领地，在先祖之魂的怒火降临前，凭自己的力量和荣耀将图腾夺回。",\n      "requiredRace": "兽族"\n    },\n    {\n      "name": "迈向软坨坨之神",\n      "description": "<user>是一只刚诞生意识的史莱姆，你现在出生在一片野外，你需要活下去，<user>现在是一团凝胶，你可以先查看周围环境然后感知自身物种的知识选择你要形成什么类型的史莱姆？“环境类？,“元素类”?或者别的类型？不过没关系，系统助手会引导你活下去成为最强史莱姆之神的，你只需要知道你在第三层级和第五层级可以进行超进化就够了，现在你可以获得两个优良品质的技能，你的选择是？",\n      "requiredRace": "史莱姆",\n      "requiredIdentity": "野生魔物"\n    },\n    {\n      "name": "孢子进化",\n      "description": "（仅限魔物）水中一个浮游生物意外拥有了意识。当无忧无虑晒太阳的日子悄然远去，一个复杂而精彩的世界，正为它缓缓拉开序幕。",\n      "requiredRace": "魔物"\n    }\n  ],\n  // 地区限定开局\n  "地区限定": [\n    {\n      "name": "踏星仪式",\n      "description": "（仅限“伯伦斯法环”开局）“雾晶学院”三年一度的大型学徒招募仪式“踏星仪式”即将举行，你决定前往“雾晶学院”求学。在繁琐的初筛过后，你随着人群进入恢宏典雅的中央礼堂，和近百名通过初选者一起坐在位子上，在二楼看热闹的各塔学徒围观下等待着仪式的进行。一顶会说话的破魔法帽将决定你们的去留，而帽子投影出的星辰将分配你的学派",\n      "requiredLocation": "大陆东北部沿海区域-伯伦斯法环-雾晶港"\n    },\n    {\n      "name": "捕雾猎手",\n      "description": "（仅限“伯伦斯法环”开局）在你的苦苦哀求下，港口的大姐头终于同意让你亲眼看看他们如何捕雾，条件是到了船上你必须听话。在即将启航的此刻，你内心充满了期待。",\n      "requiredLocation": "大陆东北部沿海区域-伯伦斯法环-雾晶港"\n    },\n    {\n      "name": "翼民的未来",\n      "description": "（仅限“圣都梵尼亚”开局）翼民圣都山脚的聚集地云雾低垂，石阶与栈道把灯火一层层挂在崖壁上。你注意不远处两名翼民原本压着嗓子交谈，却越说越急；其中一人情绪骤然爆开，高声说明明是好事为什么要遮遮掩掩。话音落地，两人像同时惊醒，立刻住口，环顾四周，沉默得只剩风铃作响。片刻后，其中一人展开双翼，转身离去。（开启改革线）",\n      "requiredLocation": "大陆中央区域-神迹山脉-天空圣域-圣都梵尼亚"\n    },\n    {\n      "name": "时钟塔学院",\n      "description": "<user>来到帝国的时钟塔城，你的父母让你去时钟塔上学，现在你的手放在时钟塔的测试水晶上检测魔力天赋，你不用担心学费，你的父母带着足够的积蓄。",\n      "requiredLocation": "大陆中东部区域-奥古斯提姆帝国-时钟塔城"\n    },\n    {\n      "name": "魔导列车",\n      "description": "<user>是在魔导列车上是新来的临时乘务，没有其他人认识他。车窗外掠过灯火、河谷和清晨的站台。",\n      "requiredLocation": "大陆中东部区域-奥古斯提姆帝国"\n    },\n    {\n      "name": "转生成为异界使魔",\n      "description": "在使魔召唤课上，同学们在导师的教学中召唤使魔，而<user>也是其中一个，只不过你出现在了魔法阵里，成为了别人的使魔，导师也十分好奇这种情况，但你的主人是一位傲慢自大的大小姐，她认为<user>就是个人形魔物，一个畜生罢了。",\n      "requiredLocation": "大陆中东部区域-奥古斯提姆帝国-时钟塔城"\n    },\n    {\n      "name": "白狐的祭礼", // by 未来色\n      "description": "你的穿越由于一位巫女的召唤而发生了偏移，你降临在兽族联盟一个古朴的神社，面前是一个几乎快要跳舞跳到晕厥的白狐巫女。",\n      "requiredLocation": "大陆中西部区域"\n    },\n    {\n      "name": "无尽之雨和无尽之旅",\n      "description": "（仅限诺瓦·瓦伦蒂亚城开局）你来到了整片大陆上最大的冒险者之城——诺瓦·瓦伦
