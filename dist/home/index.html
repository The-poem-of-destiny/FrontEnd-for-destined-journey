5f5b1> 诸王折剑，圣者失声<br data-v-4e85f5b1>群山之上响起龙的怒吼，人类举起残破的战旗，白翼于神迹下编织穹律，草原的子嗣以血盟守住西风，海中与山下的古民也献出自己的锋刃<br data-v-4e85f5b1>有神被斩落<br data-v-4e85f5b1>神血浸透群山<br data-v-4e85f5b1>有国被抹去<br data-v-4e85f5b1>连废墟也被风沙吞没<br data-v-4e85f5b1>有英雄的名字，只剩墓前低声的悼念<br data-v-4e85f5b1>最终，天穹被缝合，裂隙被钉入地底，群星重新归位 </p><p data-v-4e85f5b1>交汇之祸被按入大地。人们称那一日为战争的终结</p><p data-v-4e85f5b1> 古龙在火山与冰原之间闭目；神座高悬，回应日渐稀薄；破碎的圣律天穹化作泣空遗迹，十三座空岛至今悬在云海之上<br data-v-4e85f5b1>那些听见异世低语的人，仍在无灯之处俯首，把血滴进陌生的纹章里 </p><p data-v-4e85f5b1>岁月在伤口上长出城邦、王冠与市集<br data-v-4e85f5b1>复兴纪元四百八十八年，凡世仍在运转</p><p data-v-4e85f5b1> 双头狮鹫张开铁翼，白金拱桥横跨天穹，铁律与冠冕支撑着帝国的荣光；西风草原的战斧在鞍侧低鸣，篝火旁的歌声从未忘记边境的血债<br data-v-4e85f5b1>南海诸城灯火长明，黄金、欢愉与罪恶同潮水流转；北境的铁冠迎风燃烧，长垣之外，白霜一次次叩门<br data-v-4e85f5b1>圣山之巅，白翼看守金杯，称世间为污浊；翡翠林海重开幽径，沉默的子民再度踏上远路 </p><div class="world-quote" data-v-4e85f5b1> 听吧，旅人<br data-v-4e85f5b1> 听那虚海边缘未息的暗潮，听那古老战场低泣的晚风<br data-v-4e85f5b1> 星轨已现，航路未明<br data-v-4e85f5b1> 旧日英雄归于石碑，新生之子未识敬畏；以念为引，聚沙成塔 </div><div class="world-quote" data-v-4e85f5b1> 去吧，旅人<br data-v-4e85f5b1> 越过北境长垣不化的冰雪，穿过西风草原无尽的黄沙<br data-v-4e85f5b1> 裂隙将启，神座空悬<br data-v-4e85f5b1> 昔时圣域沦为废墟，迷途之徒难辨前路；以世为书，执剑作笔 </div><div class="update-section" data-v-4e85f5b1><h3 data-v-4e85f5b1>获取最新更新</h3><ul data-v-4e85f5b1><li data-v-4e85f5b1><a href="https://discord.com/channels/1134557553011998840/1448526819824504882" target="_blank" rel="noopener noreferrer" data-v-4e85f5b1>更新频道 *脑</a></li></ul></div></div></details>',1))]))}},Pt=(0,T.A)(Kt,[['__scopeId','data-v-4e85f5b1']]),Ot={class:'vinyl-panel'},Ht={class:'mini-turntable'},Ft={class:'mini-base'},qt={class:'mini-platter'},Rt={class:'track-name'},Wt={class:'player-controls'},Ut=['title'],Yt=(0,l.defineComponent)({__name:'VinylPlayer',setup(e){const t=[{name:'第一乐章',url:'https://files.catbox.moe/o1o64d.mp3'},{name:'第二乐章',url:'https://files.catbox.moe/vqs5tw.mp3'},{name:'第三乐章',url:'https://files.catbox.moe/b0o5l9.mp3'}],a=(0,l.ref)(0),n=(0,l.ref)(!1),o=(0,l.ref)(!0),c=(0,l.ref)(t[0]),r=(0,l.ref)(null),s=(0,l.ref)(24),i=(0,l.ref)(24),d=(0,l.ref)(!1);let u=0,m=0,v=0,p
